{% extends 'tracker/base.html' %}
{% block content %}
<style>
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
    .card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; transition: transform 0.2s; backdrop-filter: blur(5px); }
    .card:hover { transform: translateY(-5px); border-color: var(--sky-blue); }
    .poster { width: 100%; height: 300px; object-fit: cover; }
    .card-info { padding: 1rem; }
    .card-title { font-weight: 600; margin: 0 0 0.5rem 0; color: var(--sky-blue); font-size: 1rem; }
</style>

<h2>✦ My Watchlist</h2>

<div class="grid">
    {% for show in shows %}
        <div class="card">
            {% if show.poster_path %}
                <img src="{{ show.poster_path }}" alt="{{ show.title }}" class="poster">
            {% else %}
                <div class="poster" style="background: #1e293b; display: flex; align-items: center; justify-content: center;">No Poster</div>
            {% endif %}
            <div class="card-info">
                <h3 class="card-title">{{ show.title }}</h3>
            </div>
        </div>
    {% empty %}
        <p style="opacity: 0.6;">Your vault is empty. Use the "Add Show" button to start your collection!</p>
    {% endfor %}
</div>
{% endblock %}
